name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        env:
          JWT_SECRET: ci-test-secret
          NODE_ENV: test
        run: npm test

      - name: Check for raw Anthropic fetch calls (should be 1 — streaming only)
        run: |
          COUNT=$(grep -c "api\.anthropic\.com/v1/messages" server.js || true)
          echo "Raw Anthropic fetch calls found: $COUNT"
          if [ "$COUNT" -gt 1 ]; then
            echo "ERROR: Found $COUNT raw fetch calls — expected max 1 (streaming). Use callAI() from lib/ai.js instead."
            exit 1
          fi
