name: Monthly Compliance Checklist

on:
  schedule:
    - cron: '0 7 1 * *'   # First day of every month at 07:00 UTC
  workflow_dispatch:        # Allow manual trigger

permissions:
  issues: write
  contents: read

jobs:
  compliance:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate compliance checklist
        id: checklist
        run: |
          BODY=$(node scripts/compliance-check.js)
          echo "body<<BODY_EOF" >> $GITHUB_OUTPUT
          echo "$BODY" >> $GITHUB_OUTPUT
          echo "BODY_EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub Issue
        uses: actions/github-script@v7
        with:
          script: |
            const body = `${{ steps.checklist.outputs.body }}`;
            const month = new Date().toISOString().slice(0, 7);
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `✅ تقرير الامتثال الشهري — ${month}`,
              body,
              labels: ['compliance', 'monthly-review'],
            });
