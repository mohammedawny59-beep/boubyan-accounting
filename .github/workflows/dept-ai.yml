name: 🤖 AI Department — Monthly Optimization

on:
  schedule:
    - cron: '0 10 1 * *'  # 1st of every month
  workflow_dispatch:

permissions:
  issues: write
  contents: read

jobs:
  ai-optimizer:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Run AI optimizer
        run: node scripts/departments/ai-optimizer.js > /tmp/report.md

      - name: Create GitHub Issue
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('/tmp/report.md', 'utf8');
            const month = new Date().toISOString().slice(0,7);
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              title: `🤖 AI — تقرير التحسين — ${month}`,
              body,
              labels: ['department:AI', 'needs-review'],
            });
