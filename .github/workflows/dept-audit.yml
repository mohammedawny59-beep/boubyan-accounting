name: 🔍 Audit & Quality Department — Weekly

on:
  # schedule disabled 2026-07-03 — manual runs only (API cost control)
  # schedule:
  #     - cron: '0 10 * * 3'   # Every Wednesday 10:00 UTC (mid-week checkpoint)
  workflow_dispatch:

permissions:
  issues: write
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run audit & quality check
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: node scripts/departments/audit-quality.js > /tmp/report.md

      - name: Upload audit report as artifact
        uses: actions/upload-artifact@v4
        with:
          name: audit-report-${{ github.run_number }}
          path: /tmp/report.md
          retention-days: 365

      - name: Create GitHub Issue
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('/tmp/report.md', 'utf8');
            const week = new Date().toISOString().slice(0, 10);

            // Extract score from report
            const scoreMatch = body.match(/الدرجة الإجمالية[\s\S]*?(\d+)\/100/);
            const score = scoreMatch ? parseInt(scoreMatch[1]) : null;

            const labels = ['department:Audit', 'needs-review'];
            let suffix = '';
            if (score !== null) {
              if (score < 60)       { labels.push('priority:critical'); suffix = ' 🚨 CRITICAL'; }
              else if (score < 75)  { labels.push('priority:high');     suffix = ' ⚠️'; }
              else if (score >= 90) {                                    suffix = ' ⭐'; }
            }

            const scoreLabel = score !== null ? ` — درجة: ${score}/100` : '';

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              title: `🔍 Audit & Quality — ${week}${scoreLabel}${suffix}`,
              body,
              labels,
            });
