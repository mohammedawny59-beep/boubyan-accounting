name: 🪄 Design Studio — Monthly UI Proposals

on:
  # schedule disabled 2026-07-03 — manual runs only (API cost control)
  # schedule:
  #     - cron: '0 8 1 * *'   # 1st of every month 08:00 UTC
  workflow_dispatch:

permissions:
  issues: write
  contents: read

jobs:
  design-studio:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Design Studio
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_SEARCH_API_KEY: ${{ secrets.GOOGLE_SEARCH_API_KEY }}
          GOOGLE_SEARCH_CX: ${{ secrets.GOOGLE_SEARCH_CX }}
          BRAVE_API_KEY: ${{ secrets.BRAVE_API_KEY }}
        run: node scripts/departments/design-studio.js > /tmp/report.md

      - name: Create GitHub Issue
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('/tmp/report.md', 'utf8');
            const month = new Date().toISOString().slice(0,7);
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              title: `🪄 Design Studio — مقترحات UI ${month}`,
              body,
              labels: ['department:saas', 'design', 'needs-review'],
            });
