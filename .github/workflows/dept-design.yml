name: 🎨 Design/UX Department — Monthly Audit

on:
  schedule:
    - cron: '0 9 15 * *'  # 15th of every month
  workflow_dispatch:

permissions:
  issues: write
  contents: read

jobs:
  design-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run design audit
        run: node scripts/departments/design-audit.js > /tmp/report.md

      - name: Create GitHub Issue
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('/tmp/report.md', 'utf8');
            const month = new Date().toISOString().slice(0,7);
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              title: `🎨 Design/UX — تدقيق الواجهة — ${month}`,
              body,
              labels: ['department:Design', 'needs-review', 'ui/ux'],
            });
