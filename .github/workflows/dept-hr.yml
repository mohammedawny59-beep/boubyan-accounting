name: 👥 HR Department — Monthly Reminders

on:
  schedule:
    - cron: '0 7 1 * *'   # 1st of every month
    - cron: '0 7 10 * *'  # 10th of every month (PIFSS warning)
  workflow_dispatch:

permissions:
  issues: write
  contents: read

jobs:
  hr-reminders:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Run HR reminders
        run: node scripts/departments/hr-reminders.js > /tmp/report.md

      - name: Create GitHub Issue
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('/tmp/report.md', 'utf8');
            const month = new Date().toISOString().slice(0,7);
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              title: `👥 HR — تذكيرات ${month}`,
              body,
              labels: ['department:HR', 'needs-review'],
            });
