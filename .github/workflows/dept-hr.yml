name: 👥 HR Department — Monthly Reminders

on:
  # schedule disabled 2026-07-03 — manual runs only (API cost control)
  # schedule:
  #     - cron: '0 7 1 * *'   # 1st of every month
  #     - cron: '0 7 10 * *'  # 10th of every month (PIFSS warning)
  workflow_dispatch:

permissions:
  issues: write
  contents: read

jobs:
  hr-reminders:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run HR reminders
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_SEARCH_API_KEY: ${{ secrets.GOOGLE_SEARCH_API_KEY }}
          GOOGLE_CSE_ID: ${{ secrets.GOOGLE_CSE_ID }}
        run: node scripts/departments/hr-reminders.js > /tmp/report.md

      - name: Create GitHub Issue
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('/tmp/report.md', 'utf8');
            const month = new Date().toISOString().slice(0,7);
            const scoreMatch = body.match(/الدرجة الإجمالية[\s\S]*?(\d+)\/100/);
            const score = scoreMatch ? parseInt(scoreMatch[1]) : null;
            const labels = ['department:HR', 'needs-review'];
            if (score !== null && score < 60) labels.push('priority:critical');
            const scoreLabel = score !== null ? ` — درجة: ${score}/100` : '';
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              title: `👥 HR — تذكيرات ${month}${scoreLabel}`,
              body,
              labels,
            });
