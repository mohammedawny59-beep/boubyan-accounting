name: 💻 IT Department — Weekly Health Check

on:
  # schedule disabled 2026-07-03 — manual runs only (API cost control)
  # schedule:
  #     - cron: '0 6 * * 1'   # Every Monday 06:00 UTC
  workflow_dispatch:

permissions:
  issues: write
  contents: write
  pull-requests: write

jobs:
  health-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run IT health check
        run: node scripts/departments/it-health.js > /tmp/report.md

      - name: Create GitHub Issue
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('/tmp/report.md', 'utf8');
            const week = new Date().toISOString().slice(0,10);
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              title: `💻 IT — تقرير الصحة الأسبوعي — ${week}`,
              body,
              labels: ['department:IT', 'needs-review'],
            });

      - name: Auto-fix npm audit (low/moderate only)
        run: npm audit fix || true

      - name: Create PR if fixes applied
        uses: actions/github-script@v7
        with:
          script: |
            const { execSync } = require('child_process');
            const status = execSync('git status --porcelain', { encoding: 'utf8' }).trim();
            if (!status) { console.log('No auto-fixes to commit'); return; }
            const branch = `fix/npm-audit-${new Date().toISOString().slice(0,10)}`;
            execSync(`git config user.email "action@github.com"`);
            execSync(`git config user.name "IT Department Bot"`);
            execSync(`git checkout -b ${branch}`);
            execSync(`git add package-lock.json package.json`);
            execSync(`git commit -m "fix: npm audit auto-fix — ${new Date().toISOString().slice(0,10)}"`);
            execSync(`git push origin ${branch}`);
            await github.rest.pulls.create({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              title: `🔒 npm audit auto-fix — ${new Date().toISOString().slice(0,10)}`,
              body:  '> تم إنشاء هذا الـ PR تلقائياً من قسم IT.\n> راجع التغييرات وادمج إذا كانت مناسبة.',
              head:  branch,
              base:  'main',
            });
