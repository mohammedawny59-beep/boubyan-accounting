name: 📣 Marketing Growth — Weekly Content Drafts

on:
  # schedule disabled 2026-07-03 — manual runs only (API cost control)
  # schedule:
  #     - cron: '0 7 * * 2'   # Every Tuesday 07:00 UTC
  workflow_dispatch:

permissions:
  issues: write
  contents: read

jobs:
  marketing-growth:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Marketing Drafts
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/departments/marketing-growth.js > /tmp/report.md

      - name: Create GitHub Issue (NOTIFY — manual approval required)
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('/tmp/report.md', 'utf8');
            const week = new Date().toISOString().slice(0,10);
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              title: `📣 Marketing Drafts — مسودات ${week} (تحتاج موافقة)`,
              body,
              labels: ['department:saas', 'marketing', 'needs-approval'],
            });
