name: 🔎 Meta-Eval — Weekly Self-Verification

on:
  schedule:
    - cron: '0 10 * * 0'   # Every Sunday 10:00 UTC
  workflow_dispatch:

permissions:
  issues: write
  contents: read

jobs:
  meta-eval:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Meta-Eval Verification
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/departments/meta-eval.js > /tmp/report.md

      - name: Create GitHub Issue
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('/tmp/report.md', 'utf8');
            const week = new Date().toISOString().slice(0,10);
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              title: `🔎 Meta-Eval — تحقق ذاتي ${week}`,
              body,
              labels: ['department:saas', 'quality-control', 'needs-review'],
            });
