name: 🔒 Security Department — Weekly Scan

on:
  schedule:
    - cron: '0 7 * * 1'   # Every Monday 07:00 UTC
  workflow_dispatch:

permissions:
  issues: write
  contents: read

jobs:
  security-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run security scan
        run: node scripts/departments/security-scan.js > /tmp/report.md

      - name: Check for critical vulnerabilities
        id: audit
        run: |
          CRITICAL=$(npm audit --json | node -e "const d=require('fs').readFileSync('/dev/stdin','utf8'); const j=JSON.parse(d||'{}'); process.stdout.write(String(j.metadata?.vulnerabilities?.critical||0))")
          echo "critical=$CRITICAL" >> $GITHUB_OUTPUT

      - name: Create GitHub Issue
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('/tmp/report.md', 'utf8');
            const critical = '${{ steps.audit.outputs.critical }}';
            const week = new Date().toISOString().slice(0,10);
            const labels = ['department:Security', 'needs-review'];
            if (parseInt(critical) > 0) labels.push('priority:critical');
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              title: `🔒 Security — فحص أمني أسبوعي — ${week}${parseInt(critical)>0?' 🚨 CRITICAL':''}`,
              body,
              labels,
            });
