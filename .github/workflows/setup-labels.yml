name: 🏷️ Setup GitHub Labels

on:
  workflow_dispatch:   # Run once manually after first push

permissions:
  issues: write

jobs:
  labels:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const labels = [
              { name: 'department:IT',         color: '0075ca', description: 'IT Department' },
              { name: 'department:Security',    color: 'd93f0b', description: 'Security Department' },
              { name: 'department:HR',          color: '0e8a16', description: 'HR Department' },
              { name: 'department:News',        color: 'e4e669', description: 'News Department' },
              { name: 'department:RD',          color: '5319e7', description: 'R&D Department' },
              { name: 'department:Design',      color: 'f9d0c4', description: 'Design/UX Department' },
              { name: 'department:AI',          color: 'c2e0c6', description: 'AI Department' },
              { name: 'department:Operations',  color: 'fef2c0', description: 'Operations Department' },
              { name: 'department:Financial',   color: 'bfd4f2', description: 'Financial Department' },
              { name: 'department:Compliance',  color: 'fbca04', description: 'Legal/Compliance Department' },
              { name: 'department:Audit',       color: 'f97316', description: 'Audit & Quality Department' },
              { name: 'needs-review',           color: 'e11d48', description: 'Requires owner review' },
              { name: 'approved',               color: '16a34a', description: 'Approved by owner' },
              { name: 'rejected',               color: '6b7280', description: 'Rejected by owner' },
              { name: 'priority:critical',      color: 'b91c1c', description: 'Critical priority' },
              { name: 'priority:high',          color: 'ef4444', description: 'High priority' },
              { name: 'enhancement',            color: 'a2eeef', description: 'New feature suggestion' },
              { name: 'ui/ux',                  color: 'e9d5ff', description: 'UI/UX improvement' },
            ];

            for (const label of labels) {
              try {
                await github.rest.issues.createLabel({
                  owner: context.repo.owner,
                  repo:  context.repo.repo,
                  ...label,
                });
                console.log(`Created: ${label.name}`);
              } catch (e) {
                if (e.status === 422) {
                  await github.rest.issues.updateLabel({
                    owner: context.repo.owner,
                    repo:  context.repo.repo,
                    ...label,
                  });
                  console.log(`Updated: ${label.name}`);
                }
              }
            }
