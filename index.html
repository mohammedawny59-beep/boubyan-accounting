<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>نظام المحاسبة الذكي</title>
<!--
  كانت هنا نسخة قديمة كاملة من التطبيق بهوية بصرية رابعة متضاربة (CLAUDE.md بند 4).
  لا يخدمها السيرفر ولا Vercel (كلاهما يوجّه إلى public/) — استُبدلت بصفحة توجيه
  بالهوية الموحّدة Slate Pro. النسخة القديمة محفوظة في تاريخ git (014ff13).
-->
<meta http-equiv="refresh" content="0;url=/landing.html">
<style>
  :root{--bg:#0f1117;--surface:#161b27;--border:#252d42;--text:#e2e8f0;--text2:#94a3b8;--accent:#3b82f6;}
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'IBM Plex Sans Arabic',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:36px 44px;text-align:center}
  .spin{width:28px;height:28px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;margin:0 auto 14px;animation:s .8s linear infinite}
  @keyframes s{to{transform:rotate(360deg)}}
  a{color:var(--accent);text-decoration:none}
  p{font-size:13px;color:var(--text2);margin-top:6px}
</style>
</head>
<body>
  <div class="card">
    <div class="spin"></div>
    <div>جارٍ التحويل…</div>
    <p>إن لم يُحوَّل تلقائياً: <a href="/landing.html">الصفحة الرئيسية</a> · <a href="/index.html">دخول النظام</a></p>
  </div>
</body>
</html>
